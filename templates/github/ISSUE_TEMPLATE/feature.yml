name: Feature request
description: Create a buildable product story or feature request
title: "[Feature]: "
labels: ["needs:product"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or business problem are we solving?
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: Users
      description: Who is this for?
  - type: textarea
    id: desired-outcome
    attributes:
      label: Desired outcome
      description: What should be true when this is done?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Add criteria if known. The agent can help refine these with /split-work.
  - type: textarea
    id: constraints
    attributes:
      label: Constraints, risks, and non-goals
